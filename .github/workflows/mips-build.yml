name: MIPS Build for CR6606

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
        # 注意：这里不再添加 targets 参数，完全交给 Cross 处理

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Starship
        run: |
          cross build --release --target mipsel-unknown-linux-musl
        env:
          # 核心修复：关闭 LTO 避免位码检查错误，强制静态链接
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Post Process (Strip)
        # 移除调试符号，能让体积从几十 MB 缩减到 3MB 左右
        run: |
          docker run --rm -v $(pwd):/work -w /work \
          messense/rust-musl-cross:mipsel-musl \
          mipsel-linux-musl-strip target/mipsel-unknown-linux-musl/release/starship

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: starship-mipsel-cr6606
          path: target/mipsel-unknown-linux-musl/release/starship
