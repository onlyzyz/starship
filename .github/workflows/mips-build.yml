name: MIPS Build for CR6606

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nightly Rust
        # 必须使用 nightly 版本才能使用 -Z build-std
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src # 必须包含源码才能现场编译标准库

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Starship with Cross
        # 核心改动：加入 -Z build-std
        run: |
          cross build --release \
            --target mipsel-unknown-linux-musl \
            -Z build-std=std,panic_abort
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Post Process (Strip)
        run: |
          docker run --rm -v $(pwd):/work -w /work \
          ghcr.io/cross-rs/mipsel-unknown-linux-musl:latest \
          mipsel-linux-musl-strip target/mipsel-unknown-linux-musl/release/starship

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: starship-mipsel-cr6606
          path: target/mipsel-unknown-linux-musl/release/starship
