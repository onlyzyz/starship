name: MIPS Build for CR6606

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        # 这里只安装稳定的 Rust 编译器，不需要指定 target
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Starship with Cross
        # 让 Cross 自动拉取包含编译环境的 Docker 镜像
        run: |
          cross build --release --target mipsel-unknown-linux-musl
        env:
          # 强制静态链接
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Post Process (Strip)
        # 这一步非常重要，能把 50MB 的二进制缩减到 3MB 左右
        run: |
          docker run --rm -v $(pwd):/work -w /work \
          ghcr.io/cross-rs/mipsel-unknown-linux-musl:latest \
          mipsel-linux-musl-strip target/mipsel-unknown-linux-musl/release/starship

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: starship-mipsel-cr6606
          path: target/mipsel-unknown-linux-musl/release/starship
