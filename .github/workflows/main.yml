name: Cross-Compile Starship for MIPS (Fixed)

on:
  workflow_dispatch:

jobs:
  build_mips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust (Nightly)
        # 既然 Stable 没有预编译库，我们换成 Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: mips-unknown-linux-musl

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary
        # 这里是核心修改：
        # 1. 强制使用 Nightly 编译
        # 2. 增加 -Z build-std 允许自动编译 Rust 标准库
        run: |
          cross build --release \
            --target mips-unknown-linux-musl \
            --features vendored-openssl \
            -Z build-std
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: starship-mips-be
          path: target/mips-unknown-linux-musl/release/starship
